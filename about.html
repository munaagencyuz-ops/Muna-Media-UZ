<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>О нас | Muna Media</title>
<meta name="description" content="Muna Media — B2B-рекламное агентство полного цикла, прозрачного медиабаинга и репутационного менеджмента в Узбекистане. Связываем IT, маркетинг и финансы для достижения Enterprise-результатов." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #FFFFFF;
    --bg-2: #F5F5F7;
    --ink: #000000;
    --ink-soft: #1D1D1F;
    --muted: #86868B;
    --line: #000000;
    --lime: #295AE9;
    --coral: #000000;
    --violet: #295AE9;
    --cream-card: #FFFFFF;
    --accent: var(--lime);
    --accent-2: var(--coral);
    --shadow: 6px 6px 0 0 var(--ink);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Montserrat', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  .display {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 0.95;
    text-wrap: balance;
  }
  .serif {
    font-family: 'Montserrat', sans-serif;
    font-style: italic;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 32px;
  }
  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 18px 26px;
    border: 1.5px solid var(--ink);
    border-radius: 999px;
    background: var(--ink);
    color: var(--bg);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 16px;
    text-decoration: none;
    cursor: pointer;
    transition: transform .18s ease, background .18s ease, color .18s ease, box-shadow .18s ease;
    white-space: nowrap;
  }
  .btn:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 0 var(--ink); }
  .btn.lime { background: var(--accent); color: var(--bg); }
  .btn.lime:hover { box-shadow: 4px 4px 0 0 var(--ink); }
  .btn.ghost { background: transparent; color: var(--ink); }
  .btn.ghost:hover { background: var(--ink); color: var(--bg); }
  .btn .arrow { transition: transform .18s ease; }
  .btn:hover .arrow { transform: translateX(3px); }

  /* Card with hard shadow */
  .card {
    background: var(--cream-card);
    border: 1.5px solid var(--ink);
    border-radius: 28px;
    box-shadow: var(--shadow);
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border: 1.5px solid var(--ink);
    border-radius: 999px;
    background: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
  }
  .pill .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--accent); }
  .pill.solid { background: var(--ink); color: var(--bg); }
  .pill.solid .dot { background: var(--accent); }

  /* Section paddings */
  section { padding: 80px 0; position: relative; }
  .sec-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 32px; margin-bottom: 48px; flex-wrap: wrap;}
  .sec-eyebrow { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .sec-title { font-size: clamp(40px, 5vw, 72px); }

  /* Marquee */
  .marquee {
    overflow: hidden;
    border-top: 1.5px solid var(--ink);
    border-bottom: 1.5px solid var(--ink);
    background:
      linear-gradient(180deg, rgba(255,255,255,.9), rgba(245,245,247,.96)),
      radial-gradient(circle at 18% 0%, rgba(41,90,233,.08), transparent 34%);
    padding: 30px 0;
    position: relative;
  }
  .marquee::before,
  .marquee::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: min(120px, 12vw);
    z-index: 2;
    pointer-events: none;
  }
  .marquee::before { left: 0; background: linear-gradient(90deg, var(--bg-2), rgba(245,245,247,0)); }
  .marquee::after { right: 0; background: linear-gradient(270deg, var(--bg-2), rgba(245,245,247,0)); }
  .marquee-track {
    display: flex;
    gap: 18px;
    width: max-content;
    animation: scroll 46s linear infinite;
    will-change: transform;
  }
  .marquee-track > * { flex-shrink: 0; }
  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* Sticker */
  .sticker {
    display: inline-block;
    background: var(--accent);
    color: var(--ink);
    padding: 6px 12px;
    border-radius: 8px;
    transform: rotate(-3deg);
    font-weight: 700;
    border: 1.5px solid var(--ink);
  }

  /* Underline accent for inline */
  .hl {
    background: linear-gradient(transparent 62%, var(--accent) 62%, var(--accent) 92%, transparent 92%);
    padding: 0 4px;
  }
  .hl-coral { background: linear-gradient(transparent 62%, var(--accent-2) 62%, var(--accent-2) 92%, transparent 92%); padding: 0 4px; }

  /* Forms */
  .input {
    width: 100%;
    padding: 18px 22px;
    border: 1.5px solid var(--ink);
    border-radius: 16px;
    background: var(--cream-card);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    color: var(--ink);
    outline: none;
    transition: box-shadow .18s ease, transform .18s ease;
  }
  .input:focus { box-shadow: 4px 4px 0 0 var(--ink); transform: translate(-2px,-2px); }
  textarea.input { resize: vertical; min-height: 110px; font-family: 'Inter', sans-serif; }

  /* Nav */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1.5px solid var(--ink);
  }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; }
  .nav-links { display: flex; gap: 12px; align-items: center; }
  /* Dropdowns */
  .dropdown {
    position: relative;
    display: inline-block;
  }
  .dropdown-trigger {
    color: var(--ink);
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 12px;
    border-radius: 8px;
    transition: background 0.2s, color 0.2s;
  }
  .dropdown-trigger:hover {
    background: var(--bg-2);
  }
  .dropdown-menu {
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--bg);
    border: 1.5px solid var(--ink);
    border-radius: 16px;
    box-shadow: 4px 4px 0 0 var(--ink);
    min-width: 260px;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s, transform 0.2s, visibility 0.2s;
    z-index: 200;
    padding: 8px;
  }
  .dropdown:hover .dropdown-menu {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(2px);
  }
  .dropdown-item {
    display: block;
    padding: 10px 14px;
    color: var(--ink);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
  }
  .dropdown-item:hover {
    background: var(--accent);
    color: var(--bg);
  }

  /* Logo */
  .logo {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: -0.04em;
    color: var(--ink);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .logo .blob {
    width: 22px; height: 22px;
    background: var(--accent);
    border: 1.5px solid var(--ink);
    border-radius: 999px;
    display: inline-block;
  }

  /* Hero blob backgrounds */
  .blob-shape {
    position: absolute;
    border-radius: 50%;
    filter: blur(0px);
    z-index: 0;
    pointer-events: none;
  }

  /* Util */
  .row { display: flex; gap: 24px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  @media (max-width: 900px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .nav-links { display: none; }
  }

  /* small bits */
  .num-big {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    letter-spacing: -0.05em;
    line-height: 0.9;
    font-variation-settings: "opsz" 96;
  }
  a { color: inherit; }

  /* faq */
  .faq-item {
    border-top: 1.5px solid var(--ink);
    padding: 28px 0;
    cursor: pointer;
  }
  .faq-item:last-child { border-bottom: 1.5px solid var(--ink); }
  .faq-q { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
  .faq-title { font-size: clamp(20px, 2.5vw, 28px); font-weight: 600; letter-spacing: -0.01em; }
  .faq-toggle {
    width: 44px; height: 44px; border-radius: 999px;
    border: 1.5px solid var(--ink); background: var(--cream-card);
    display: grid; place-items: center; flex-shrink: 0;
    transition: background .2s ease, transform .2s ease;
  }
  .faq-item.open .faq-toggle { background: var(--accent); transform: rotate(45deg); }
  .faq-a {
    max-height: 0; overflow: hidden;
    transition: max-height .35s ease, margin-top .25s ease;
    color: var(--ink-soft);
    font-size: 17px; line-height: 1.6;
  }
  .faq-item.open .faq-a { max-height: 400px; margin-top: 16px; }

  /* preview logo placeholder */
  .logo-chip {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
    letter-spacing: -0.02em;
    opacity: .82;
    white-space: nowrap;
  }
  .logo-chip .glyph {
    width: 28px; height: 28px;
    border: 1.5px solid var(--ink);
    border-radius: 6px;
    display: inline-grid;
    place-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    background: var(--cream-card);
  }
  .brand-logo-chip {
    height: 46px;
    min-width: var(--logo-w, 120px);
    justify-content: center;
    opacity: .86;
  }
  .brand-logo-chip img {
    display: block;
    width: var(--logo-w, 120px);
    max-width: var(--logo-w, 120px);
    max-height: 34px;
    object-fit: contain;
    filter: grayscale(1) contrast(1.08);
    mix-blend-mode: multiply;
  }
  .brand-logo-chip.compact {
    height: 36px;
    min-width: calc(var(--logo-w, 112px) * .9);
    opacity: .62;
  }
  .brand-logo-chip.compact img {
    max-height: 28px;
  }

  /* tag list */
  .tag {
    display: inline-flex;
    align-items: center;
    padding: 6px 12px;
    border: 1.5px solid var(--ink);
    border-radius: 999px;
    background: var(--cream-card);
    font-size: 13px;
    font-weight: 500;
  }

  /* image placeholder */
  .ph {
    background:
      repeating-linear-gradient(135deg, transparent 0 14px, rgba(0,0,0,0.06) 14px 15px),
      var(--cream-card);
    border: 1.5px solid var(--ink);
    border-radius: 24px;
    display: grid;
    place-items: center;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* scroll indicator */
  .scroll-pill {
    position: absolute;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    z-index: 2;
  }

  /* spinner ticker */
  .spin {
    animation: spin 18s linear infinite;
    transform-origin: center;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @media (max-width: 760px) {
    .container {
      padding: 0 20px;
    }
    section {
      padding: 56px 0;
    }
    .display {
      letter-spacing: 0;
      line-height: 1.02;
    }
    .sec-head {
      margin-bottom: 32px;
      gap: 18px;
    }
    .sec-eyebrow {
      align-items: flex-start;
      flex-direction: column;
      gap: 10px;
    }
    .sec-title {
      font-size: clamp(34px, 11vw, 48px);
      line-height: 1.04;
    }
    .pill {
      max-width: 100%;
      white-space: normal;
      line-height: 1.25;
      border-radius: 18px;
    }
    .mono {
      font-size: 10px;
      line-height: 1.45;
    }
    .btn {
      width: 100%;
      justify-content: center;
      padding: 16px 18px;
      white-space: normal;
      text-align: center;
      line-height: 1.2;
      min-height: 54px;
    }
    .card {
      border-radius: 22px;
      box-shadow: 4px 4px 0 0 var(--ink);
    }
    .hero-badge {
      display: none !important;
    }
    #hero {
      padding-top: 56px !important;
      padding-bottom: 44px !important;
    }
    #hero h1 {
      font-size: clamp(40px, 13vw, 58px) !important;
      max-width: 100% !important;
      margin-bottom: 22px !important;
    }
    #hero p {
      font-size: 17px !important;
      line-height: 1.55 !important;
    }
    .hero-main-row {
      gap: 24px !important;
      margin-bottom: 34px !important;
    }
    .hero-actions {
      width: 100%;
      gap: 10px !important;
    }
    .hero-strip {
      grid-template-columns: 1fr 1fr !important;
      border-radius: 18px !important;
    }
    .hero-strip-item {
      padding: 18px !important;
    }
    .hero-strip-item .num-big {
      font-size: 34px !important;
    }
    .cases-grid {
      gap: 22px !important;
    }
    .case-card-head {
      padding: 22px 20px 18px !important;
      min-height: 92px;
      gap: 12px !important;
    }
    .case-card-head > .mono {
      max-width: 42%;
      text-align: right;
    }
    .case-card-logo {
      width: min(var(--case-logo-w, 160px), 50vw) !important;
      height: 42px;
    }
    .case-card-logo img {
      height: 36px;
    }
    .case-card-body {
      padding: 24px 20px 22px !important;
      gap: 18px !important;
    }
    .case-card-body h3 {
      font-size: clamp(30px, 9vw, 42px) !important;
      line-height: 1.02 !important;
    }
    .case-card-body p {
      font-size: 16px !important;
      line-height: 1.55 !important;
    }
    .tag {
      font-size: 12px;
      padding: 6px 10px;
    }
    .case-metrics {
      grid-template-columns: 1fr !important;
      gap: 14px !important;
      padding-top: 18px !important;
    }
    .case-metrics > div {
      border-right: 0 !important;
      border-bottom: 1px dashed var(--ink);
      padding: 0 0 14px !important;
    }
    .case-metrics > div:last-child {
      border-bottom: 0;
      padding-bottom: 0 !important;
    }
    .case-metrics .num-big {
      font-size: 36px !important;
    }
    .marquee {
      padding: 18px 0;
    }
    .marquee-track {
      gap: 12px;
      animation-duration: 34s;
    }
    .brand-logo-chip {
      height: 58px;
      min-width: clamp(124px, calc(var(--logo-w, 120px) * .82 + 42px), 190px);
      padding: 10px 18px;
      border-radius: 18px;
    }
    .brand-logo-chip img {
      width: calc(var(--logo-w, 120px) * .78);
      height: 34px;
    }
    .services-grid {
      grid-template-columns: 1fr !important;
      gap: 20px !important;
    }
    .service-card {
      min-height: unset !important;
      padding: 24px 20px !important;
    }
    .service-card h3 {
      font-size: 26px !important;
    }
    .service-card ul li {
      font-size: 14px !important;
    }
    .service-card .btn {
      width: auto;
      min-width: 132px;
      padding: 13px 16px !important;
      min-height: 46px;
    }
    .cta-grid {
      grid-template-columns: 1fr !important;
      gap: 28px !important;
    }
    .ph {
      min-height: 220px;
      height: auto !important;
      border-radius: 18px;
    }
    .faq-item {
      padding: 22px 0;
    }
    .faq-title {
      font-size: 18px;
      line-height: 1.25;
    }
    .faq-toggle {
      width: 38px;
      height: 38px;
    }
    .final-cta-card {
      padding: 32px 20px !important;
      border-radius: 22px !important;
    }
    .final-cta-card h2 {
      font-size: clamp(34px, 10vw, 48px) !important;
    }
    .final-cta-link {
      align-self: stretch !important;
    }
    .contact-form-card {
      padding: 22px 18px !important;
      border-radius: 18px !important;
    }
    .input {
      padding: 15px 16px;
      font-size: 16px;
      border-radius: 14px;
    }
    footer .container {
      align-items: flex-start !important;
    }
  }

  @media (max-width: 420px) {
    .container {
      padding: 0 16px;
    }
    section {
      padding: 48px 0;
    }
    #hero h1 {
      font-size: clamp(36px, 13vw, 48px) !important;
    }
    .hero-strip {
      grid-template-columns: 1fr !important;
    }
    .hero-strip-item {
      border-right: 0 !important;
    }
    .case-card-head {
      flex-direction: column;
      align-items: flex-start !important;
    }
    .case-card-head > .mono {
      max-width: 100%;
      text-align: left;
    }
    .case-card-logo {
      width: min(var(--case-logo-w, 160px), 72vw) !important;
    }
    .service-card > div:first-child {
      flex-direction: column;
    }
    .service-card > div:first-child > div:last-child {
      text-align: left !important;
    }
  }

</style>
